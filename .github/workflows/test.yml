name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest tests/ -q --tb=short --ignore=tests/benchmarks -m "not slow and not integration and not cross_validation and not benchmark and not compatibility"
